services:
  - type: web
    name: kavi-ki-vidya-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run server
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: OPENAI_AUDIO_ASSESSMENT_MODEL
        value: gpt-audio-1.5
      - key: OPENAI_TEXT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: nova
      - key: OPENAI_TTS_INSTRUCTIONS
        value: Speak as a warm Indian English woman coach for adult learners. Use a calm, clear, natural Indian English accent, medium-slow pace, and gentle encouragement. Do not exaggerate the accent.
      - key: PRONUNCIATION_TRANSCRIPT_WEIGHT
        value: "0.08"
      - key: PRONUNCIATION_CLEAR_THRESHOLD
        value: "90"
      - key: PRONUNCIATION_PRACTICE_THRESHOLD
        value: "70"
      - key: PRONUNCIATION_MIN_CLARITY_FOR_CLEAR
        value: "86"
      - key: PRONUNCIATION_MIN_SOUND_FOR_CLEAR
        value: "86"
      - key: PRONUNCIATION_MIN_RHYTHM_FOR_CLEAR
        value: "78"
      - key: OPENAI_TRANSCRIBE_LANGUAGE
        value: en
      - key: PROGRESS_STORAGE_PROVIDER
        value: supabase-rest
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PROGRESS_TABLE
        value: learner_progress
