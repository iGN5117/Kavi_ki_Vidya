appId: com.kavikividya.app
---
- launchApp:
    clearState: true
- openLink: kavi-ki-vidya://expo-development-client/?url=http%3A%2F%2F10.0.2.2%3A8081
- extendedWaitUntil:
    visible: "Continue"
    timeout: 10000
- tapOn: "Continue"
- tapOn: "Continue"
- tapOn: "Start speaking"
- openLink: kavi-ki-vidya://speak/conversation?mode=free&verifyAudioText=Hello%20from%20Kavi.
- extendedWaitUntil:
    visible:
      id: "conversation-replay-audio-button"
    timeout: 30000
- tapOn:
    id: "conversation-replay-audio-button"
